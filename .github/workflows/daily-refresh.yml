name: Daily Capital Radar Refresh

on:
  schedule:
    # 8:30 AM America/New_York during EDT. Revisit if exact EST handling is required in winter.
    - cron: '30 12 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-capital-radar-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Regenerate live state
        run: npm run generate:live

      - name: Regenerate markdown report
        run: npm run report

      - name: Show data health
        run: cat outputs/data-health.json

      - name: Commit refreshed radar outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/report-state.live.json outputs/live-capital-radar.md outputs/data-health.json
          if git diff --cached --quiet; then
            echo "No refreshed radar output changes to commit."
          else
            git commit -m "Refresh live capital radar data"
            git push origin main
          fi
