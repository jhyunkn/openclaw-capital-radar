<style>.system-health-panel{margin-top:18px;border-color:rgba(251,250,246,.18)}.health-verdict{display:grid;grid-template-columns:auto auto 1fr;gap:10px;align-items:center;border:1px solid var(--rule);border-radius:16px;padding:12px 14px;margin:10px 0 12px;background:#ffffff}.health-verdict span{font-size:10px;text-transform:uppercase;letter-spacing:.09em;color:var(--muted)}.health-verdict strong{font-size:18px}.health-verdict small{color:var(--muted);font-size:12px;line-height:1.3}.health-verdict.good strong{color:var(--green)}.health-verdict.warn strong{color:var(--warn)}.health-verdict.bad strong{color:var(--red)}.health-grid{display:grid;grid-template-columns:repeat(6,minmax(0,1fr));gap:8px}.health-grid article{border:1px solid var(--rule);border-radius:14px;background:#ffffff;padding:10px;min-width:0}.health-grid span{display:block;color:var(--muted);font-size:9px;text-transform:uppercase;letter-spacing:.08em}.health-grid b{display:block;font-size:18px;margin-top:4px;overflow:hidden;text-overflow:ellipsis}.health-grid small{display:block;color:var(--muted);font-size:10px;margin-top:3px;line-height:1.25}@media(max-width:1000px){.health-grid{grid-template-columns:repeat(2,minmax(0,1fr))}.health-verdict{grid-template-columns:1fr}.health-verdict strong{font-size:22px}}</style>
